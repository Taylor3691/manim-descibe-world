[CLI]
# Thư mục gốc chứa toàn bộ output
media_dir = ./media

# Chất lượng mặc định (làm nhanh)
quality = medium_quality

# Tự mở video sau khi render (optional)
preview = False

# Format video
format = mp4

# FPS
frame_rate = 30

# Resolution (medium_quality ~ 720p)
pixel_height = 720
pixel_width = 1280

# Thư mục chứa file tạm (optional)
# tex_dir = ./output/Tex
# text_dir = ./output/Text

# Ghi đè file nếu trùng tên
write_to_movie = True